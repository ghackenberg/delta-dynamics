    <title>Delta Dynamics — Low-Poly 3D Ecosystem Simulator</title>

    <!-- Primary SEO Meta Tags -->
    <meta name="description" content="Play Delta Dynamics, a premium low-poly terrain and water simulation game built with React, Three.js, and local AI (Web-LLM)." />

    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#111827" />
    <link rel="canonical" href="https://ghackenberg.github.io/delta-dynamics/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ghackenberg.github.io/delta-dynamics/" />
    <meta property="og:title" content="Delta Dynamics — Low-Poly 3D Ecosystem Simulator" />
    <meta property="og:description" content="Experience a premium GPU-accelerated water and terrain simulation with autonomous AI entities right in your browser." />
    <meta property="og:image" content="https://ghackenberg.github.io/delta-dynamics/og-image.jpg" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- PWA Meta Tags & Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((reg) => console.log('Service Worker registered successfully with scope:', reg.scope))
            .catch((err) => console.error('Service Worker registration failed:', err));
        });
      }
    </script>

    <script defer data-domain="ghackenberg.github.io" src="https://analytics.mentawise.com/js/script.js"></script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
